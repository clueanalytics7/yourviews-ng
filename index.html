<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourViews | Citizen Policy Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // CHANGE THIS URL to your deployed Google Web App URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAHktT1vxCya9I-q0OOsDb-lMnal8-SxD7sjbkomEQVsuh5pNLf6O7FjE_ZzPUYWin9Q/exec";

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 900: '#14532d' }, 
                        sentiment: {
                            strAgree: '#16a34a', 
                            agree: '#4ade80',    
                            neutral: '#94a3b8',  
                            disagree: '#fb923c', 
                            strDisagree: '#ef4444'
                        }
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border-color: rgba(255, 255, 255, 0.1); }
        .issue-card:hover { transform: translateY(-4px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="toggleView('home')">
                    <div class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                        <i class="fas fa-landmark text-white"></i>
                    </div>
                    <span class="text-xl font-800 tracking-tight text-slate-900 dark:text-white">YourViews</span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-2.5 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
                        <i id="theme-icon" class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <div id="home-view">
            <header class="mb-12 text-center max-w-2xl mx-auto">
                <h1 class="text-4xl font-800 mb-4 bg-clip-text text-transparent bg-gradient-to-r from-brand-600 to-brand-900">Shape Your Community</h1>
                <p class="text-slate-600 dark:text-slate-400">Transparent policy engagement for citizens. Every vote is verified and anonymous.</p>
            </header>

            <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading State -->
                <div class="col-span-full py-20 text-center">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-brand-500 border-t-transparent"></div>
                    <p class="mt-4 text-slate-500">Connecting to portal...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Feedback Overlay -->
    <div id="feedback-toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] hidden">
        <div class="bg-brand-600 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3">
            <i class="fas fa-check-circle"></i>
            <span id="toast-msg">Response recorded!</span>
        </div>
    </div>

    <script>
        let allIssues = [];
        let fingerprint = '';

        window.onload = () => {
            initTheme();
            fingerprint = getFingerprint();
            fetchIssues();
        };

        function getFingerprint() { 
            const nav = window.navigator; 
            const screen = window.screen; 
            let str = nav.userAgent + nav.language + screen.colorDepth + screen.height + screen.width; 
            return btoa(str).slice(-20).replace(/[^a-z0-9]/gi, ''); 
        }

        async function fetchIssues() {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getIssues`);
                const data = await response.json();
                allIssues = data;
                renderIssues();
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('issues-grid').innerHTML = `
                    <div class="col-span-full text-center py-12 text-red-500">
                        <i class="fas fa-exclamation-triangle text-3xl mb-4"></i>
                        <p>Error connecting to backend. Please check the URL configuration.</p>
                    </div>`;
            }
        }

        function renderIssues() {
            const grid = document.getElementById('issues-grid');
            grid.innerHTML = allIssues.map(issue => `
                <div class="issue-card glass rounded-3xl p-6 flex flex-col h-full border border-slate-200 dark:border-slate-800">
                    <div class="mb-4">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold bg-brand-100 text-brand-700 dark:bg-brand-900/30 dark:text-brand-400">
                            ${issue.category || 'Policy'}
                        </span>
                    </div>
                    <h3 class="text-xl font-700 mb-3 text-slate-900 dark:text-white">${issue.title}</h3>
                    <p class="text-slate-600 dark:text-slate-400 text-sm mb-6 flex-grow leading-relaxed">${issue.description}</p>
                    
                    <div class="space-y-3">
                        <button onclick="castVote('${issue.id}', 'strAgree')" class="w-full py-2.5 rounded-xl bg-sentiment-strAgree/10 hover:bg-sentiment-strAgree text-sentiment-strAgree hover:text-white font-bold transition-all text-sm">Strongly Agree</button>
                        <button onclick="castVote('${issue.id}', 'agree')" class="w-full py-2.5 rounded-xl bg-sentiment-agree/10 hover:bg-sentiment-agree text-sentiment-agree hover:text-white font-bold transition-all text-sm">Agree</button>
                        <button onclick="castVote('${issue.id}', 'neutral')" class="w-full py-2.5 rounded-xl bg-sentiment-neutral/10 hover:bg-sentiment-neutral text-sentiment-neutral hover:text-white font-bold transition-all text-sm">Neutral</button>
                        <button onclick="castVote('${issue.id}', 'disagree')" class="w-full py-2.5 rounded-xl bg-sentiment-disagree/10 hover:bg-sentiment-disagree text-sentiment-disagree hover:text-white font-bold transition-all text-sm">Disagree</button>
                        <button onclick="castVote('${issue.id}', 'strDisagree')" class="w-full py-2.5 rounded-xl bg-sentiment-strDisagree/10 hover:bg-sentiment-strDisagree text-sentiment-strDisagree hover:text-white font-bold transition-all text-sm">Strongly Disagree</button>
                    </div>
                </div>
            `).join('');
        }

        async function castVote(issueId, sentiment) {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i>';
            btn.disabled = true;

            const voteData = {
                action: 'castVote',
                issueId: issueId,
                fingerprint: fingerprint,
                sentiment: sentiment,
                comment: "",
                demographics: {
                    age: "Not Provided",
                    gender: "Not Provided",
                    neighborhood: "General",
                    education: "N/A",
                    employment: "N/A"
                }
            };

            try {
                // Using NO-CORS mode if you have issues, 
                // but standard redirect handling is usually better with text/plain
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Essential for Google Apps Script redirects
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(voteData)
                });
                
                showToast("Vote recorded anonymously!");
            } catch (err) {
                console.error("Submission failed:", err);
                showToast("Submission sent! (Redirecting)", "info");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('feedback-toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function toggleDarkMode() { 
            const isDark = document.documentElement.classList.toggle('dark'); 
            localStorage.setItem('theme', isDark ? 'dark' : 'light'); 
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon'; 
        }

        function initTheme() { 
            const isDark = localStorage.getItem('theme') === 'dark'; 
            if (isDark) { 
                document.documentElement.classList.add('dark'); 
                document.getElementById('theme-icon').className = 'fas fa-sun'; 
            } 
        }

        function toggleView(v) { 
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
